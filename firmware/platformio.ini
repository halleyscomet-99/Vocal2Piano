; Voice2Piano -- Teensy 4.1 PlatformIO config
[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

; Dependencies
lib_deps =
    waspinator/AccelStepper @ ^1.64

; Serial monitor baud rate (matches firmware)
monitor_speed = 115200

; Build flags (optional optimisations)
build_flags =
    -O2
    -DSERIAL_USB_TYPE=USB_SERIAL
